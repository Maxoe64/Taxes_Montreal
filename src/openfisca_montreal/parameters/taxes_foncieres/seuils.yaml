description: >-
  Seuils utilisés pour le calcul des taux différenciés.
metadata:
  reference:
    - title: Comment sont calculées les taxes municipales
      href: https://montreal.ca/articles/comment-sont-calculees-les-taxes-municipales-8962

seuil_non_residentiel:
  description: >-
    Seuil de valeur foncière pour les taux différenciés non résidentiels.
    La tranche 1 s'applique sur la valeur ≤ ce seuil,
    la tranche 2 sur la valeur excédant ce seuil.
  unit: currency-CAD
  values:
    2026-01-01:
      value: 900000
