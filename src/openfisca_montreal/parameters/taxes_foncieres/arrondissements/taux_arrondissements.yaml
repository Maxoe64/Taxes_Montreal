description: >-
  Taxes d'arrondissement: chaque arrondissement impose deux taxes
  (services et investissements) à taux unique, identique pour toutes
  les catégories d'immeubles. Certains arrondissements imposent aussi
  des montants fixes par unité d'évaluation. Taux en $ par 100 $.
metadata:
  reference:
    - title: Taux de taxes pour 2026
      href: https://montreal.ca/articles/taux-de-taxes-pour-2026-106147
  note: >-
    Les taxes d'arrondissement sont à taux uniques: elles sont les mêmes
    pour toutes les catégories d'immeubles (résidentiel, non résidentiel,
    terrain vague desservi).

